name: Typecheck

on: [push, pull_request]

jobs:
  Typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: Install modules
        run: bun install --frozen-lockfile

      - name: Run Typecheck
        run: bun run typecheck
